<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Down Adventure - Foosha Village</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#111;
}

#viewport{
    width:100vw;
    height:100vh;
    overflow:hidden;
    position:relative;
}

#world{
    position:absolute;
    width:4000px;
    height:4000px;
    background-color:#417545;
    /* Rich multi-tone grass texturing */
    background-image: 
        radial-gradient(#37633a 15%, transparent 16%),
        radial-gradient(#4a854f 15%, transparent 16%),
        linear-gradient(45deg, rgba(0,0,0,0.02) 25%, transparent 25%, transparent 75%, rgba(0,0,0,0.02) 75%);
    background-size: 60px 60px, 40px 40px, 80px 80px;
    background-position: 0 0, 20px 20px, 0 0;
}

/* --- ADVANCED BIOME LAYOUTS --- */

.ocean {
    position: absolute;
    left: 0;
    top: 0;
    width: 480px;
    height: 4000px;
    background: #2b527a;
    border-right: 16px solid #fff;
    overflow: hidden;
}

.ocean::before {
    content: "";
    position: absolute;
    right: 0;
    top: 0;
    width: 40px;
    height: 100%;
    background: rgba(255,255,255,0.25);
    animation: waveMove 2.2s infinite ease-in-out alternate;
}

@keyframes waveMove {
    0% { transform: translateX(0px); }
    100% { transform: translateX(-25px); }
}

.beach {
    position: absolute;
    left: 480px;
    top: 0;
    width: 240px;
    height: 4000px;
    background: #e0be82;
    border-right: 14px solid #cfae74;
    box-shadow: inset -25px 0 0 #d4b47b;
}

.cliff-edge {
    position: absolute;
    left: 720px;
    top: 0;
    width: 35px;
    height: 4000px;
    background: #254a28;
    box-shadow: 8px 0 15px rgba(0,0,0,0.2);
}

.pier {
    position: absolute;
    left: 460px;
    top: 2100px;
    width: 420px;
    height: 115px;
    background: #4d3525;
    border: 6px solid #332218;
    background-image: linear-gradient(90deg, transparent 90%, #332218 90%);
    background-size: 45px 100%;
    box-shadow: 0px 18px 0px rgba(0,0,0,0.45);
    z-index: 5;
}

.road-network {
    position: absolute;
    background: #caa974;
    border-style: solid;
    border-color: #bfa06d;
    box-shadow: inset 0 0 15px rgba(0,0,0,0.05);
    z-index: 1;
}

/* --- DETAILED LANDMARKS --- */

.building-shadow {
    position: absolute;
    left: 1690px;
    top: 1660px;
    width: 310px;
    height: 220px;
    background: rgba(0,0,0,0.2);
    border-radius: 8px;
    z-index: 4;
}

.bar-building {
    position: absolute;
    left: 1700px;
    top: 1650px;
    width: 290px;
    height: 215px;
    background: #734e36;
    border: 8px solid #452e1f;
    border-radius: 6px;
    z-index: 10;
}

.bar-roof {
    position: absolute;
    top: -55px;
    left: -20px;
    width: 314px;
    height: 65px;
    background: #a33434;
    border: 6px solid #732222;
    background-image: linear-gradient(0deg, #8c2b2b 50%, transparent 50%);
    background-size: 100% 16px;
}

.bar-door {
    position: absolute;
    bottom: 0;
    left: 55px;
    width: 55px;
    height: 85px;
    background: #382419;
    border: 5px solid #1f140e;
}

.bar-window {
    position: absolute;
    top: 55px;
    right: 50px;
    width: 65px;
    height: 55px;
    background: #f7d04f;
    border: 5px solid #452e1f;
    box-shadow: inset 0 0 15px #ba8318;
}

.bar-sign {
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    background: #e3caa1;
    border: 4px solid #332218;
    padding: 6px 24px;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    font-size: 16px;
    color: #1f140e;
    box-shadow: 0 6px 0 rgba(0,0,0,0.25);
}

.stone-path {
    position: absolute;
    left: 1755px;
    top: 1865px;
    width: 55px;
    height: 40px;
    background-image: radial-gradient(#828282 30%, transparent 35%);
    background-size: 15px 15px;
    z-index: 2;
}

/* --- NATURAL DECORATIONS --- */

.bush {
    position: absolute;
    width: 50px;
    height: 44px;
    background: #23542a;
    border: 4px solid #153319;
    border-radius: 45% 45% 50% 50%;
    box-shadow: 2px 4px 0 rgba(0,0,0,0.15);
    z-index: 9;
}

.flower-patch {
    position: absolute;
    width: 40px;
    height: 40px;
    background-image: radial-gradient(#fff9a6 15%, transparent 20%);
    background-size: 12px 12px;
    z-index: 2;
    opacity: 0.85;
}

.fence {
    position: absolute;
    background: #8f6740;
    border: 2px solid #543c24;
    z-index: 8;
}
.fence-h { height: 12px; background-image: linear-gradient(90deg, #543c24 25%, transparent 25%); background-size: 18px 100%; }
.fence-v { width: 12px; background-image: linear-gradient(0deg, #543c24 25%, transparent 25%); background-size: 100% 18px; }

.barrel {
    position: absolute;
    width: 26px;
    height: 34px;
    background: #784a29;
    border: 3px solid #3d2413;
    border-radius: 4px;
    box-shadow: 2px 3px 0 rgba(0,0,0,0.2);
    z-index: 9;
}

.tree{
    position:absolute;
    width:95px;
    height:95px;
    background: #285e33;
    border-radius:50%;
    border:6px solid #143019;
    box-shadow: inset -12px -12px 0 #1e4726, 4px 8px 0 rgba(0,0,0,0.15);
    z-index: 12;
}

.tree::after{
    content:"";
    position:absolute;
    width:20px;
    height:30px;
    background:#664229;
    border: 3px solid #362215;
    left:31px;
    bottom:-20px;
}

/* --- CORE CHARACTER & UI STYLES --- */
#player, .npc {
    position:absolute;
    width:90px;
    height:110px;
    z-index:100;
}

#player {
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
}

.shadow{
    position:absolute;
    width:36px;
    height:14px;
    background:rgba(0,0,0,0.4);
    border-radius:50%;
    left:50%;
    bottom:0px;
    transform:translateX(-50%);
}

#sprite {
    position:absolute;
    left:50%;
    top:0px;
    height:110px;
    width:auto;
    transform:translateX(-50%);
    image-rendering: pixelated;
}

.npc-placeholder {
    width: 8px;
    height: 8px;
    position: absolute;
    left: 50%;
    top: 15px;
    transform: translateX(-50%);
}

.talk-prompt {
    position: absolute;
    top: -32px;
    left: 50%;
    transform: translateX(-50%);
    background: #fff;
    color: #000;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    font-weight: bold;
    padding: 3px 8px;
    border: 2px solid #000;
    border-radius: 4px;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.2s ease, transform 0.2s ease;
    pointer-events: none;
    z-index: 200;
}

.talk-prompt.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(-5px);
}

#info{
    position:fixed;
    top:10px;
    left:10px;
    color:white;
    background:rgba(0,0,0,0.8);
    padding:12px;
    border-radius:6px;
    border: 2px solid #444;
    font-family: 'Courier New', monospace;
    z-index:999;
}

#dialogue-box {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 80%;
    max-width: 800px;
    background: rgba(10, 10, 15, 0.98);
    border: 4px solid gold; 
    border-image: linear-gradient(to right, #b8860b, #ffd700) 1;
    padding: 20px;
    color: white;
    font-family: 'Courier New', Courier, monospace;
    font-size: 20px;
    font-weight: bold;
    display: none;
    z-index: 1000;
    box-shadow: 0px 0px 25px rgba(0,0,0,0.85);
}

#npc-name {
    color: #ffcc00;
    margin-bottom: 5px;
    font-size: 22px;
}
</style>
</head>
<body>

<div id="viewport">
    <div id="world">
        <div class="ocean"></div>
        <div class="beach"></div>
        <div class="cliff-edge"></div>
        <div class="pier"></div>
        
        <div class="road-network" style="left:840px; top:2110px; width:1600px; height:85px; border-top-width:4px; border-bottom-width:4px;"></div>
        <div class="road-network" style="left:1760px; top:1800px; width:95px; height:520px; border-left-width:4px; border-right-width:4px;"></div>

        <div class="fence fence-h" style="left:860px; top:2098px; width:430px;"></div>
        <div class="fence fence-h" style="left:1390px; top:2098px; width:370px;"></div>
        <div class="fence fence-v" style="left:1688px; top:1700px; height:415px;"></div>

        <div class="flower-patch" style="left:1000px; top:1850px;"></div>
        <div class="flower-patch" style="left:2150px; top:1550px;"></div>
        <div class="flower-patch" style="left:1450px; top:2350px;"></div>

        <div class="bush" style="left:1150px; top:2045px;"></div>
        <div class="bush" style="left:1580px; top:2155px;"></div>
        <div class="bush" style="left:1920px; top:1590px;"></div>

        <div class="barrel" style="left:845px; top:2065px;"></div>
        <div class="barrel" style="left:1650px; top:1775px;"></div>

        <div class="building-shadow"></div>
        <div class="stone-path"></div>

        <div class="bar-building">
            <div class="bar-roof"></div>
            <div class="bar-door"></div>
            <div class="bar-window"></div>
            <div class="bar-sign">PARTY'S BAR</div>
        </div>

        <div class="tree" style="left:850px; top:700px;"></div>
        <div class="tree" style="left:1250px; top:950px;"></div>
        <div class="tree" style="left:2300px; top:1350px;"></div>
        <div class="tree" style="left:2900px; top:1050px;"></div>
        <div class="tree" style="left:3100px; top:2350px;"></div>
        <div class="tree" style="left:1520px; top:1520px;"></div>
        <div class="tree" style="left:1380px; top:1720px;"></div>
        <div class="tree" style="left:950px; top:2350px;"></div>
    </div>

    <div id="player">
        <div class="shadow"></div>
        <img id="sprite" src="file:///C:/Users/ajcro/Downloads/sprite_2LUFFY-Photoroom.png" alt="Luffy">
    </div>
</div>

<div id="info">⛵ <b>VILLAGE NAVIGATION:</b> W A S D<br>💬 <b>NPC CONVERSATION:</b> Get close + Tap T</div>

<div id="dialogue-box">
    <div id="npc-name">Name</div>
    <div id="npc-text">Dialogue goes here...</div>
</div>

<script>
const world = document.getElementById("world");
const sprite = document.getElementById("sprite");
const dialogueBox = document.getElementById("dialogue-box");
const npcNameLabel = document.getElementById("npc-name");
const npcTextLabel = document.getElementById("npc-text");

const WORLD_WIDTH = 4000;
const WORLD_HEIGHT = 4000;

let playerX = 2000;
let playerY = 2000;

const speed = 5;
const keys = {};

let walking = false;
let frame = 0;
let animTimer = 0;
let activeNpcTalk = null; 

const Palettes = {
    skin: '#fcd0a1',
    hair: '#3a2214',
    makino_hair: '#2c4c38',
    makino_dress: '#539165',
    apron: '#f5f5f5',
    mayor_hat: '#4a3525',
    mayor_robe: '#b3543d',
    fish_shirt: '#3b5998',
    fish_pants: '#6d7b8d',
    boots: '#222'
};

const npcList = [
    {
        name: "Makino (Bartender)",
        x: 1725,
        y: 1765,
        dialogue: "Welcome back, Luffy! Are you hungry? Make sure you don't cause trouble for anchor-guy today!",
        element: null,
        art: `
            0px 0px ${Palettes.makino_hair}, 8px 0px ${Palettes.makino_hair}, 16px 0px ${Palettes.makino_hair},
            -8px 8px ${Palettes.makino_hair}, 0px 8px ${Palettes.skin}, 8px 8px ${Palettes.skin}, 16px 8px ${Palettes.skin}, 24px 8px ${Palettes.makino_hair},
            -8px 16px ${Palettes.makino_hair}, 0px 16px ${Palettes.skin}, 8px 16px ${Palettes.skin}, 16px 16px ${Palettes.skin}, 24px 16px ${Palettes.makino_hair},
            0px 24px ${Palettes.skin}, 8px 24px ${Palettes.skin}, 16px 24px ${Palettes.skin},
            -8px 32px ${Palettes.makino_dress}, 0px 32px ${Palettes.apron}, 8px 32px ${Palettes.apron}, 16px 32px ${Palettes.apron}, 24px 32px ${Palettes.makino_dress},
            -8px 40px ${Palettes.makino_dress}, 0px 40px ${Palettes.apron}, 8px 40px ${Palettes.apron}, 16px 40px ${Palettes.apron}, 24px 40px ${Palettes.makino_dress},
            -8px 48px ${Palettes.makino_dress}, 0px 48px ${Palettes.makino_dress}, 8px 48px ${Palettes.makino_dress}, 16px 48px ${Palettes.makino_dress}, 24px 48px ${Palettes.makino_dress},
            -8px 56px ${Palettes.makino_dress}, 0px 56px ${Palettes.makino_dress}, 8px 56px ${Palettes.makino_dress}, 16px 56px ${Palettes.makino_dress}, 24px 56px ${Palettes.makino_dress},
            0px 64px ${Palettes.skin}, 16px 64px ${Palettes.skin},
            -4px 72px ${Palettes.boots}, 12px 72px ${Palettes.boots}
        `
    },
    {
        name: "Woop Slap (Mayor)",
        x: 1810,
        y: 2040,
        dialogue: "Luffy! Stop talking about becoming a pirate! It brings shame upon our entire village!",
        element: null,
        art: `
            -8px -8px ${Palettes.mayor_hat}, 0px -8px ${Palettes.mayor_hat}, 8px -8px ${Palettes.mayor_hat}, 16px -8px ${Palettes.mayor_hat}, 24px -8px ${Palettes.mayor_hat},
            -16px 0px ${Palettes.mayor_hat}, -8px 0px ${Palettes.mayor_hat}, 0px 0px ${Palettes.mayor_hat}, 8px 0px ${Palettes.mayor_hat}, 16px 0px ${Palettes.mayor_hat}, 24px 0px ${Palettes.mayor_hat}, 32px 0px ${Palettes.mayor_hat},
            0px 8px ${Palettes.skin}, 8px 8px ${Palettes.skin}, 16px 8px ${Palettes.skin},
            -4px 16px #fff, 0px 16px ${Palettes.skin}, 8px 16px ${Palettes.skin}, 16px 16px ${Palettes.skin}, 20px 16px #fff,
            0px 24px #fff, 8px 24px #fff, 16px 24px #fff,
            -8px 32px ${Palettes.mayor_robe}, 0px 32px ${Palettes.mayor_robe}, 8px 32px ${Palettes.mayor_robe}, 16px 32px ${Palettes.mayor_robe}, 24px 32px ${Palettes.mayor_robe},
            -8px 40px ${Palettes.mayor_robe}, 0px 40px ${Palettes.mayor_robe}, 8px 40px ${Palettes.mayor_robe}, 16px 40px ${Palettes.mayor_robe}, 24px 40px ${Palettes.mayor_robe},
            -8px 48px ${Palettes.mayor_robe}, 0px 48px ${Palettes.mayor_robe}, 8px 48px ${Palettes.mayor_robe}, 16px 48px ${Palettes.mayor_robe}, 24px 48px ${Palettes.mayor_robe},
            -8px 56px ${Palettes.mayor_robe}, 0px 56px ${Palettes.mayor_robe}, 8px 56px ${Palettes.mayor_robe}, 16px 56px ${Palettes.mayor_robe}, 24px 56px ${Palettes.mayor_robe},
            0px 64px ${Palettes.boots}, 16px 64px ${Palettes.boots}
        `
    },
    {
        name: "Local Fisherman",
        x: 840,
        y: 2050,
        dialogue: "Watch out for the Local Sea King out in the deep waters, kid. It's dangerous!",
        element: null,
        art: `
            0px 0px ${Palettes.hair}, 8px 0px ${Palettes.hair}, 16px 0px ${Palettes.hair},
            -8px 8px ${Palettes.hair}, 0px 8px ${Palettes.skin}, 8px 8px ${Palettes.skin}, 16px 8px ${Palettes.skin}, 24px 8px ${Palettes.hair},
            0px 16px ${Palettes.skin}, 8px 16px ${Palettes.skin}, 16px 16px ${Palettes.skin},
            -8px 24px ${Palettes.fish_shirt}, 0px 24px ${Palettes.fish_shirt}, 8px 24px #fff, 16px 24px ${Palettes.fish_shirt}, 24px 24px ${Palettes.fish_shirt},
            -8px 32px ${Palettes.fish_shirt}, 0px 32px ${Palettes.fish_shirt}, 8px 32px #fff, 16px 32px ${Palettes.fish_shirt}, 24px 32px ${Palettes.fish_shirt},
            -4px 40px ${Palettes.fish_shirt}, 0px 40px ${Palettes.fish_shirt}, 8px 40px ${Palettes.fish_shirt}, 16px 40px ${Palettes.fish_shirt}, 20px 40px ${Palettes.fish_shirt},
            0px 48px ${Palettes.fish_pants}, 12px 48px ${Palettes.fish_pants},
            0px 56px ${Palettes.fish_pants}, 12px 56px ${Palettes.fish_pants},
            -2px 64px ${Palettes.boots}, 14px 64px ${Palettes.boots}
        `
    }
];

function spawnNPCs() {
    npcList.forEach(npc => {
        const npcDiv = document.createElement("div");
        npcDiv.className = "npc";
        npcDiv.style.left = `${npc.x}px`;
        npcDiv.style.top = `${npc.y}px`;

        const prompt = document.createElement("div");
        prompt.className = "talk-prompt";
        prompt.innerText = "Press T";
        npcDiv.appendChild(prompt);

        const shadow = document.createElement("div");
        shadow.className = "shadow";
        npcDiv.appendChild(shadow);

        const visual = document.createElement("div");
        visual.className = "npc-placeholder";
        visual.style.boxShadow = npc.art;
        npcDiv.appendChild(visual);

        world.appendChild(npcDiv);
        npc.element = npcDiv;
    });
}

document.addEventListener("keydown", e=>{
    const key = e.key.toLowerCase();
    keys[key] = true;

    if (key === "t") {
        let closestNpc = null;
        let minDistance = 120;

        npcList.forEach(npc => {
            const dx = playerX - npc.x;
            const dy = playerY - npc.y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < minDistance) {
                minDistance = distance;
                closestNpc = npc;
            }
        });

        if (closestNpc) {
            if (activeNpcTalk === closestNpc) {
                activeNpcTalk = null;
                dialogueBox.style.display = "none";
            } else {
                activeNpcTalk = closestNpc;
                npcNameLabel.innerText = closestNpc.name;
                npcTextLabel.innerText = closestNpc.dialogue;
                dialogueBox.style.display = "block";
            }
        }
    }
});

document.addEventListener("keyup", e=>{
    keys[e.key.toLowerCase()] = false;
});

function update(){
    let moving = false;

    if (!activeNpcTalk) {
        if(keys["w"]) { playerY -= speed; moving = true; }
        if(keys["s"]) { playerY += speed; moving = true; }
        if(keys["a"]) { playerX -= speed; moving = true; }
        if(keys["d"]) { playerX += speed; moving = true; }
    }

    playerX = Math.max(100, Math.min(WORLD_WIDTH-100, playerX));
    playerY = Math.max(100, Math.min(WORLD_HEIGHT-100, playerY));

    if(moving){
        animTimer++;
        if(animTimer % 10 === 0){
            frame = (frame + 1) % 2;
        }
    }

    const bob = moving ? Math.sin(animTimer * 0.3) * 2 : 0;
    document.getElementById("player").style.transform =
        `translate(-50%,-50%) translateY(${bob}px)`;

    if(keys["a"]) sprite.style.transform = "translateX(-50%) scaleX(-1)";
    else if(keys["d"]) sprite.style.transform = "translateX(-50%) scaleX(1)";

    npcList.forEach(npc => {
        const dx = playerX - npc.x;
        const dy = playerY - npc.y;
        const distance = Math.sqrt(dx * dx + dy * dy);

        if (npc.element) {
            const prompt = npc.element.querySelector('.talk-prompt');
            const innerVisual = npc.element.querySelector('.npc-placeholder');

            if (distance < 120) {
                prompt.classList.add('visible');
                if (dx > 0) {
                    innerVisual.style.transform = "translateX(-50%) scaleX(-1)";
                } else {
                    innerVisual.style.transform = "translateX(-50%) scaleX(1)";
                }
            } else {
                prompt.classList.remove('visible');
                if (activeNpcTalk === npc) {
                    activeNpcTalk = null;
                    dialogueBox.style.display = "none";
                }
            }
        }
    });

    const cameraX = playerX - window.innerWidth / 2;
    const cameraY = playerY - window.innerHeight / 2;
    world.style.transform = `translate(${-cameraX}px, ${-cameraY}px)`;

    requestAnimationFrame(update);
}

spawnNPCs();
update();
</script>

</body>
</html>
