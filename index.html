<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windmill Village RPG</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;background:#111;}

/* VIEW */
#viewport{
    width:100vw;height:100vh;overflow:hidden;position:relative;
}

/* WORLD */
#world{
    position:absolute;
    width:4000px;height:4000px;

    background:#6fbf73;
    background-image:
        linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px);
    background-size:50px 50px;

    border:80px solid #2b2b2b;
}

/* TREE */
.tree{
    position:absolute;
    width:70px;height:70px;
    background:#2f6d3c;
    border-radius:50%;
    border:5px solid #1c4d29;
}

/* HOUSE */
.house{
    position:absolute;
    width:120px;height:100px;
    background:#c98b4b;
    border:5px solid #5a3a1b;
}

/* WINDMILL */
.windmill{
    position:absolute;
    width:60px;height:140px;
    background:#ddd;
    border:5px solid #444;
}
.windmill::after{
    content:"";
    position:absolute;
    width:120px;height:120px;
    border-radius:50%;
    border:6px solid #222;
    left:-35px;top:-60px;
}

/* NPC */
.npc{
    position:absolute;
    width:35px;height:45px;
    background:#e3c08d;
    border:3px solid #3a2a1a;
}

/* PLAYER */
#player{
    position:absolute;
    left:50%;top:50%;
    width:90px;height:110px;
    transform:translate(-50%,-50%);
    z-index:10;
}

.shadow{
    position:absolute;
    width:36px;height:14px;
    background:rgba(0,0,0,0.35);
    border-radius:50%;
    left:50%;bottom:0;
    transform:translateX(-50%);
}

#sprite{
    position:absolute;
    left:50%;top:0;
    height:110px;
    transform:translateX(-50%);
}

/* UI */
#info{
    position:fixed;
    top:10px;left:10px;
    background:rgba(0,0,0,0.6);
    color:white;
    padding:10px;
    font-family:Arial;
    border-radius:8px;
    z-index:999;
}
</style>
</head>
<body>

<div id="viewport">
    <div id="world">

        <!-- village -->
        <div class="house" style="left:700px;top:800px;"></div>
        <div class="house" style="left:1400px;top:1200px;"></div>
        <div class="windmill" style="left:2500px;top:1600px;"></div>

        <div class="tree" style="left:900px;top:600px;"></div>
        <div class="tree" style="left:1600px;top:900px;"></div>
        <div class="tree" style="left:2200px;top:1400px;"></div>

    </div>

    <div id="player">
        <div class="shadow"></div>
        <img id="sprite"
        src="file:///C:/Users/easha/Documents/One-Piece-Knock-Off/Visuals/PLAYERLUFFY/11-20/sprite_1LUFFY.png">
    </div>
</div>

<div id="info"></div>

<script>
const world = document.getElementById("world");
const sprite = document.getElementById("sprite");

let playerX = 2000;
let playerY = 2000;

const keys = {};
const speed = 5;

/* ===== LEVEL SYSTEM ===== */
let level = 1;
let xp = 0;

/* ===== QUEST ===== */
const quests = [{
    text:"Talk to 3 villagers",
    goal:3,
    progress:0,
    completed:false,
    reward:100
}];

let touchedNPCs = new Set();

/* ===== NPCS ===== */
const npcs = [];

function createNPC(x,y){
    const el = document.createElement("div");
    el.className = "npc";
    world.appendChild(el);

    npcs.push({
        el,x,y,
        dx:Math.random()*2-1,
        dy:Math.random()*2-1,
        t:0
    });
}

for(let i=0;i<20;i++){
    createNPC(
        500+Math.random()*3000,
        500+Math.random()*3000
    );
}

/* INPUT */
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

/* XP */
function addXP(amount){
    xp += amount;
    if(xp >= level*100 && level < 10){
        xp -= level*100;
        level++;
        alert("LEVEL UP! Level " + level);
    }
}

/* QUEST */
function checkQuests(){
    quests.forEach(q=>{
        if(!q.completed){
            q.progress = touchedNPCs.size;
            if(q.progress >= q.goal){
                q.completed = true;
                addXP(q.reward);
                alert("Quest Complete!");
            }
        }
    });
}

/* UI */
function updateUI(){
    document.getElementById("info").innerHTML = `
    LEVEL: ${level}/10<br>
    XP: ${xp}/${level*100}<br>
    QUEST: ${quests[0].text}<br>
    (${quests[0].progress}/${quests[0].goal})
    `;
}

/* GAME LOOP */
function update(){

    let moving=false;

    if(keys["w"]){playerY-=speed;moving=true;}
    if(keys["s"]){playerY+=speed;moving=true;}
    if(keys["a"]){playerX-=speed;moving=true;}
    if(keys["d"]){playerX+=speed;moving=true;}

    playerX=Math.max(100,Math.min(3900,playerX));
    playerY=Math.max(100,Math.min(3900,playerY));

    /* NPC update */
    npcs.forEach((n,i)=>{
        n.t++;

        if(n.t%60===0){
            n.dx=Math.random()*2-1;
            n.dy=Math.random()*2-1;
        }

        n.x += n.dx;
        n.y += n.dy;

        n.el.style.left=n.x+"px";
        n.el.style.top=n.y+"px";

        let dx=n.x-playerX;
        let dy=n.y-playerY;
        let dist=Math.sqrt(dx*dx+dy*dy);

        if(dist<60){
            touchedNPCs.add(i);
        }
    });

    checkQuests();
    updateUI();

    /* camera */
    let camX = playerX - window.innerWidth/2;
    let camY = playerY - window.innerHeight/2;

    world.style.transform=`translate(${-camX}px,${-camY}px)`;

    requestAnimationFrame(update);
}

update();
updateUI();
</script>

</body>
</html>
